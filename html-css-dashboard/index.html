<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="navbar">
    <h1>Dashboard</h1>
  </nav>

  <div class="container">

    <aside class="sidebar">

      <div class="menu-item">Home</div>
      <div class="menu-item">Analytics</div>
      <div class="menu-item">Projects</div>
      <div class="menu-item">Settings</div>

    </aside>

    <main class="content">

      <section class="cards">

        <div class="card">
          <h2>Users</h2>
          <p>1,250</p>
        </div>

        <div class="card">
          <h2>Revenue</h2>
          <p>$12,000</p>
        </div>

        <div class="card">
          <h2>Orders</h2>
          <p>320</p>
        </div>

      </section>

    </main>

  </div>

</body>
</html>
